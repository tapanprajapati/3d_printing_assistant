services:
  init:
    image: busybox
    command: >
      sh -c "mkdir -p /data /public/uploads/images /public/uploads/models
             && chown -R 1001:1001 /data /public/uploads"
    volumes:
      - ./data:/data
      - ./public/uploads:/public/uploads

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: 3d-printing-assistant:latest
    container_name: 3d-printing-assistant
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "80:3000"
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
