steps:
  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - '-t'
      - >-
        $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - .
      - '-f'
      - Dockerfile

  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - >-
        $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - '--platform=managed'
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
      - >-
        --image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - >-
        --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
      - '--execution-environment=gen2'
      - '--max-instances=1'
      - '--clear-volume-mounts'
      - '--clear-volumes'
      - '--add-volume=name=gcs-data,type=cloud-storage,bucket=$_GCS_BUCKET,mount-options=implicit-dirs'
      - '--add-volume-mount=volume=gcs-data,mount-path=/app'
      - '--add-volume=name=gcs-uploads,type=cloud-storage,bucket=$_GCS_BUCKET,mount-options=implicit-dirs'
      - '--add-volume-mount=volume=gcs-uploads,mount-path=/app'
      - '--set-env-vars=DATABASE_URL=file:/app/data/dev.db,NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1,NEXTAUTH_URL=$_NEXTAUTH_URL,AUTH_TRUST_HOST=true,NEXTAUTH_SECRET=$_NEXTAUTH_SECRET,SEED_EMAIL=$_SEED_EMAIL,SEED_PASSWORD=$_SEED_PASSWORD'

images:
  - >-
    $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _DEPLOY_REGION: us-east1
  _AR_HOSTNAME: us-east1-docker.pkg.dev
  _TRIGGER_ID: a399fdee-5375-4c30-9310-f4178e226599
  _AR_REPOSITORY: cloud-run-source-deploy
  _AR_PROJECT_ID: d-printing-assistant-490723
  _SERVICE_NAME: printing-assistant
  _GCS_BUCKET: printing-assistant-data
  _NEXTAUTH_URL: https://printing-assistant-549862892095.us-east1.run.app
  # _NEXTAUTH_SECRET: set in Cloud Build trigger UI (not committed here)
  # _SEED_EMAIL:      set in Cloud Build trigger UI (not committed here)
  # _SEED_PASSWORD:   set in Cloud Build trigger UI (not committed here)

tags:
  - gcp-cloud-build-deploy-cloud-run
  - gcp-cloud-build-deploy-cloud-run-managed
  - printing-assistant
